name: RepoMan 3.0.5 patch

on:
  push:
    branches:
      - repoman-3-0-5-prefixed-functions

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: repoman-3-0-5-prefixed-functions
          fetch-depth: 0

      - name: Prefix RepoMan functions
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('repoman.php')
          text = path.read_text()

          replacements = {
              'Version: 3.0.4': ('Version: 3.0.5', 1),
              'scan_plugin_main_file_for_update_headers': ('repoman_scan_plugin_main_file_for_update_headers', 2),
              'get_blocked_plugin_slugs': ('repoman_get_blocked_plugin_slugs', 2),
              'dynamic_block_plugin_updates': ('repoman_dynamic_block_plugin_updates', 2),
              'dynamic_block_deactivated_plugin_updates': ('repoman_dynamic_block_deactivated_plugin_updates', 2),
          }

          for old, (new, expected) in replacements.items():
              actual = text.count(old)
              if actual != expected:
                  raise SystemExit(f'Expected {expected} occurrences of {old!r}, found {actual}')
              text = text.replace(old, new)

          path.write_text(text)
          PY

          php -l repoman.php
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add repoman.php
          git commit -m "Bump RepoMan to 3.0.5"
          git push origin HEAD:repoman-3-0-5-prefixed-functions
